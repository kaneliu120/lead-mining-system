miners:
  # ── Phase 1 Primary Plugins ────────────────────────────────────────
  serper:
    enabled: true
    country_code: "ph"
    language: "en"
    results_per_page: 20
    rate_limit_per_minute: 60
    timeout_seconds: 15

  apollo:
    enabled: true
    rate_limit_per_minute: 30
    timeout_seconds: 20

  # ── Phase 2 Supplementary Plugins ────────────────────────────────────────
  google_cse:
    enabled: false
    country: "countryPH"
    rate_limit_per_minute: 10          # Free 100/day, conservative rate limiting

  sec_ph:
    enabled: false
    rate_limit_per_minute: 20
    timeout_seconds: 30

  reddit:
    enabled: false
    rate_limit_per_minute: 55
    target_subreddits:
      - Philippines
      - phinvest
      - Entrepreneur
      - smallbusiness

  # ── Phase 3 Scraping Plugins ────────────────────────────────────────
  philgeps:
    enabled: false
    rate_limit_per_minute: 5           # Government website, extremely conservative
    timeout_seconds: 60

  facebook:
    enabled: false
    api_version: "v22.0"
    radius_meters: 30000               # 30km coverage of Metro Manila
    page_limit: 50                     # Items per page (Graph API max 100)
    rate_limit_per_minute: 30
    timeout_seconds: 20

  dti_bnrs:
    enabled: false
    rate_limit_per_minute: 3           # Government website, extremely conservative
    timeout_seconds: 60
    max_pages: 5                       # Maximum page turns per search
