user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    # ── Rate limiting zones (nginx layer first line of defense) ──────────────
    # General API limit: 10 requests per second per IP, burst allows 20
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
    # Heavy operation limit: 2 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_heavy:10m rate=2r/s;

    # Global security response headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS — force browser to use HTTPS (max-age=1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    include /etc/nginx/conf.d/*.conf;
}
