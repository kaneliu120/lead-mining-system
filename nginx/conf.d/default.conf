# 临时 HTTP 配置 — 仅用于 Certbot ACME 验证，SSL 初始化前使用
# 生产完整配置由 setup-ssl.sh 生成并覆盖此文件

server {
    listen 80;
    server_name _;

    # 安全响应头（临时配置也需要）
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # robots.txt — 临时阶段也禁止爬虫
    location = /robots.txt {
        return 200 "User-agent: *\nDisallow: /\n";
        add_header Content-Type text/plain;
    }

    # Certbot ACME 验证目录
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Lead Mining API — 重型操作（采集/富化）使用更严格的速率限制
    location ~ ^/(mine|enrich) {
        limit_req zone=api_heavy burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://lead-miner:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Lead Mining API — 通用端点
    location ~ ^/(leads|rag|export|health|stats|dashboard|settings|crm|enrich|scoring) {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://lead-miner:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 其余请求临时反代到 n8n（HTTP）
    location / {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://n8n:5678;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
