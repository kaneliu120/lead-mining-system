# Temporary HTTP configuration — for Certbot ACME validation only, used before SSL initialization
# Full production configuration is generated by setup-ssl.sh and overwrites this file

server {
    listen 80;
    server_name _;

    # Security response headers (required even for temporary config)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # robots.txt — also block crawlers during temporary phase
    location = /robots.txt {
        return 200 "User-agent: *\nDisallow: /\n";
        add_header Content-Type text/plain;
    }

    # Certbot ACME validation directory
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Lead Mining API — heavy operations (mining/enrichment) use stricter rate limiting
    location ~ ^/(mine|enrich) {
        limit_req zone=api_heavy burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://lead-miner:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Lead Mining API — general endpoints
    location ~ ^/(leads|rag|export|health|stats|dashboard|settings|crm|enrich|scoring) {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://lead-miner:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other requests temporarily proxied to n8n (HTTP)
    location / {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://n8n:5678;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
