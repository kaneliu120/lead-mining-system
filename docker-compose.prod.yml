# Production docker-compose — uses GHCR pre-built images (pushed by GitHub Actions CI/CD)
# Usage: docker compose -f docker-compose.prod.yml up -d
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-leads}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.23
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/.chroma/index
    environment:
      CHROMA_SERVER_AUTHN_CREDENTIALS: ${CHROMA_AUTH_TOKEN:-}
      CHROMA_SERVER_AUTHN_PROVIDER:    ${CHROMA_AUTH_TOKEN:+chromadb.auth.token_authn.TokenAuthenticationServerProvider}
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  lead-miner:
    image: ghcr.io/kaneliu120/lead-mining-system/lead-miner:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-leads}
      CHROMA_HOST:  chromadb
      CHROMA_PORT:  "8000"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    ports:
      - "8010:8000"
    volumes:
      - ./lead-mining-engine/config:/app/config:ro
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  sales-outreach:
    image: ghcr.io/kaneliu120/lead-mining-system/sales-outreach:latest
    restart: unless-stopped
    env_file: .env
    environment:
      LEAD_MINER_URL: http://lead-miner:8000
      DATABASE_URL:   postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-leads}
    depends_on:
      lead-miner:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  n8n:
    image: n8nio/n8n:2.9.4
    restart: unless-stopped
    environment:
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_JWT_SECRET}
      N8N_OWNER_EMAIL:                ${N8N_OWNER_EMAIL:-admin@leadminer.local}
      N8N_OWNER_FIRST_NAME:           ${N8N_OWNER_FIRST_NAME:-Admin}
      N8N_OWNER_LAST_NAME:            ${N8N_OWNER_LAST_NAME:-User}
      N8N_OWNER_PASSWORD:             ${N8N_OWNER_PASSWORD}
      N8N_PUBLIC_API_DISABLED:        "false"
      WEBHOOK_URL:                    ${WEBHOOK_URL:-http://localhost:5678}
      N8N_EDITOR_BASE_URL:            ${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      DB_TYPE:                        postgresdb
      DB_POSTGRESDB_HOST:             postgres
      DB_POSTGRESDB_PORT:             5432
      DB_POSTGRESDB_DATABASE:         ${POSTGRES_DB:-leads}
      DB_POSTGRESDB_USER:             ${POSTGRES_USER:-postgres}
      DB_POSTGRESDB_PASSWORD:         ${POSTGRES_PASSWORD:-postgres}
      DB_POSTGRESDB_SCHEMA:           n8n
      LEAD_MINER_URL:                 http://lead-miner:8000
      GEMINI_API_KEY:                 ${GEMINI_API_KEY}
      # When proxied via nginx HTTPS, set protocol to https to fix cookies
      N8N_PROTOCOL:                   ${N8N_PROTOCOL:-https}
      # Cookie security (must be false for HTTP; remove this line if HTTPS is configured)
      N8N_SECURE_COOKIE:              "true"
      N8N_PROXY_HOPS:                 "1"        # Trust nginx-passed X-Forwarded-For
      N8N_LOG_LEVEL:                  info
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/home/node/workflows:ro
    ports:
      - "5678:5678"

  # ── Nginx reverse proxy + SSL entrypoint ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - n8n
      - lead-miner
      - sales-outreach

  # ── Certbot automatic SSL certificate ─────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: ["/bin/sh", "-c", "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"]

volumes:
  postgres_data:
  chroma_data:
  n8n_data:
  certbot_www:
  certbot_certs:

networks:
  default:
    name: lead-mining-net
